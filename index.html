<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DOOM [1515] — Alliance Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0a0c0f;--bg1:#111418;--bg2:#181c22;--bg3:#1e232b;--bg4:#252b35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --gold:#c9973a;--gold2:#e8b84b;--gold-dim:rgba(201,151,58,0.15);
  --green:#2ea87e;--green-dim:rgba(46,168,126,0.15);
  --red:#d94f4f;--red-dim:rgba(217,79,79,0.15);
  --orange:#d47c2a;--orange-dim:rgba(212,124,42,0.15);
  --blue:#3a82c9;--blue-dim:rgba(58,130,201,0.15);
  --purple:#9c6fe0;--purple-dim:rgba(156,111,224,0.15);
  --text:#e8eaf0;--text2:#8a90a0;--text3:#555d6e;
  --radius:10px;--radius-sm:6px;
  --font-head:'Rajdhani',sans-serif;--font-body:'Exo 2',sans-serif;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:var(--font-body);color:var(--text);font-size:15px;line-height:1.5}
.page{display:none;flex-direction:column;height:100%;overflow:hidden}
.page.active{display:flex}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}
.page-scroll::-webkit-scrollbar,.modal::-webkit-scrollbar,.flag-grid::-webkit-scrollbar{width:0}
.topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.topbar-title{font-family:var(--font-head);font-size:20px;font-weight:700;letter-spacing:1px;color:var(--gold)}
.topbar-sub{font-size:11px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.bottomnav.hidden{display:none}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;cursor:pointer;color:var(--text3);transition:color 0.2s;gap:3px;border:none;background:none;font-family:var(--font-body)}
.bn-item.active{color:var(--gold)}
.bn-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bn-item span{font-size:9px;font-weight:500;letter-spacing:0.3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-family:var(--font-head);font-size:17px;font-weight:700;letter-spacing:0.5px;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color 0.2s}
.field input:focus,.field select:focus{border-color:var(--gold);background:var(--bg4)}
.field select option{background:var(--bg2)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:var(--radius-sm);border:none;font-family:var(--font-head);font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.15s;width:100%;text-transform:uppercase}
.btn:active{transform:scale(0.97)}
.btn-gold{background:var(--gold);color:#0a0c0f}.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-purple{background:var(--purple);color:#fff}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;letter-spacing:0.5px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px}
.badge-gold{background:var(--gold-dim);color:var(--gold2);border:1px solid rgba(201,151,58,0.3)}
.badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(46,168,126,0.3)}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(217,79,79,0.3)}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(212,124,42,0.3)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(58,130,201,0.3)}
.badge-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.badge-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(156,111,224,0.3)}
.player-row{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.player-row.status-selected{border-left:3px solid var(--green)}
.player-row.status-reserve{border-left:3px solid var(--gold)}
.player-row.status-absent{border-left:3px solid var(--red)}
.player-row.status-miss{border-left:3px solid var(--text3)}
.player-avatar{width:38px;height:38px;border-radius:50%;background:var(--bg4);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-name{font-family:var(--font-head);font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.player-meta{font-size:12px;color:var(--text2);margin-top:1px}
.player-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg4);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0;color:var(--text3)}
.icon-btn:active{transform:scale(0.93)}
.icon-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn.active-green{background:var(--green);border-color:var(--green);color:#fff}
.icon-btn.active-gold{background:var(--gold);border-color:var(--gold);color:#0a0c0f}
.icon-btn.active-white{background:#c8cdd8;border-color:#c8cdd8;color:#0a0c0f}
.icon-btn.active-red{background:var(--red);border-color:var(--red);color:#fff}
.tabs{display:flex;gap:6px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all 0.15s;font-family:var(--font-head);letter-spacing:0.5px}
.tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.event-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.event-card{border:1.5px solid var(--border2);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all 0.2s;background:var(--bg3)}
.event-card h3{font-family:var(--font-head);font-size:13px;font-weight:700;margin-top:4px}
.event-card p{font-size:10px;color:var(--text2);margin-top:3px}
.event-card .ev-icon{font-size:24px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 4px;text-align:center}
.stat-box .num{font-family:var(--font-head);font-size:20px;font-weight:700}
.stat-box .lbl{font-size:9px;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;margin-top:1px}
.auth-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg0)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .logo-icon{font-size:52px;margin-bottom:8px}
.auth-logo h1{font-family:var(--font-head);font-size:28px;font-weight:700;letter-spacing:2px;color:var(--gold)}
.auth-logo p{font-size:13px;color:var(--text3);margin-top:4px;letter-spacing:0.5px}
.auth-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.auth-tabs{display:flex;margin-bottom:24px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;gap:3px}
.auth-tab{flex:1;text-align:center;padding:9px;border-radius:var(--radius-sm);font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer;color:var(--text3);transition:all 0.2s;border:none;background:none}
.auth-tab.active{background:var(--gold);color:#0a0c0f}
.profile-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 16px;text-align:center}
.profile-flag{font-size:48px;margin-bottom:8px}
.profile-name{font-family:var(--font-head);font-size:22px;font-weight:700}
.flag-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;max-height:180px;overflow-y:auto;background:var(--bg3);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border2)}
.flag-opt{font-size:24px;text-align:center;padding:4px;border-radius:4px;cursor:pointer;transition:background 0.1s}
.flag-opt:hover,.flag-opt.selected{background:var(--gold-dim)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom))}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);flex-shrink:0}
.split-team{background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px}
.split-team-title{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.split-row{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg4);border-radius:var(--radius-sm);margin-bottom:4px}
.split-row-reserve{background:rgba(212,124,42,0.12);border:1px solid rgba(212,124,42,0.25)}
.split-rank{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text3);min-width:28px}
.split-name{font-family:var(--font-head);font-size:14px;font-weight:600;flex:1;display:flex;align-items:center;gap:5px}
.split-power{font-size:12px;color:var(--gold);font-weight:600}
.divider{height:1px;background:var(--border);margin:16px 0}
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 20px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;white-space:nowrap;pointer-events:none;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
.toast.info{border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;padding:32px 20px;color:var(--text3)}
.empty .empty-icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:13px}
.reg-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--border)}
.reg-info{flex:1;min-width:0}
.reg-name{font-family:var(--font-head);font-size:15px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.reg-time{font-size:11px;color:var(--text3)}
.member-row{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.member-top{display:flex;align-items:center;gap:10px}
.member-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.notice{background:var(--gold-dim);border:1px solid rgba(201,151,58,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--gold);margin-bottom:12px}
.notice.red{background:var(--red-dim);border-color:rgba(217,79,79,0.3);color:var(--red)}
svg.ico{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-3px}
.unit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.unit-opt{border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--bg3)}
.unit-opt.sel-tank{border-color:#8dd9ff;background:rgba(141,217,255,0.12)}
.unit-opt.sel-avion{border-color:#a6ffa6;background:rgba(166,255,166,0.12)}
.unit-opt.sel-missile{border-color:#ff9494;background:rgba(255,148,148,0.12)}
.unit-opt-icon{display:flex;justify-content:center;align-items:center;height:32px;margin-bottom:4px}
.unit-opt-icon svg{width:28px;height:28px}
.unit-opt-label{font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--text2)}
.unit-icon{display:inline-flex;align-items:center;vertical-align:middle;flex-shrink:0;line-height:0}
.lang-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border2);border-radius:20px;background:var(--bg3);color:var(--text2);font-family:var(--font-head);font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.lang-btn:hover{border-color:var(--gold);color:var(--gold)}
.desert-team-toggle{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.desert-team-opt{border:1.5px solid var(--border2);border-radius:var(--radius);padding:12px 6px;cursor:pointer;text-align:center;transition:all 0.15s;background:var(--bg3)}
.desert-team-opt h3{font-family:var(--font-head);font-size:15px;font-weight:700}
.desert-team-opt p{font-size:10px;color:var(--text2);margin-top:2px;line-height:1.4}
.desert-team-opt.active-a{border-color:var(--blue);background:var(--blue-dim)}
.desert-team-opt.active-b{border-color:var(--red);background:var(--red-dim)}
.desert-team-opt.active-both{border-color:var(--purple);background:var(--purple-dim)}
.ab-badge{font-family:var(--font-head);font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--purple-dim);color:var(--purple);border:1px solid rgba(156,111,224,0.4)}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;flex-shrink:0}
.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.emoji-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;background:var(--bg3);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border2)}
.emoji-opt{font-size:22px;text-align:center;padding:4px;border-radius:4px;cursor:pointer;transition:background 0.1s}
.emoji-opt:hover,.emoji-opt.selected{background:var(--gold-dim)}
.ev-counter-card{border-radius:var(--radius);padding:14px;margin-bottom:12px}
.managed-ev-row{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.managed-ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.managed-ev-info{flex:1;min-width:0}
.managed-ev-name{font-family:var(--font-head);font-size:15px;font-weight:700}
.managed-ev-meta{font-size:11px;color:var(--text3);margin-top:2px}
.managed-ev-locked{font-size:10px;color:var(--gold);margin-top:3px;font-weight:600}
.team-type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
/* FLAG / EMBLEM PICKER */
.flag-picker-btn{display:flex;align-items:center;gap:10px;font-size:15px;padding:11px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text);transition:border-color 0.2s}
.flag-picker-btn:hover{border-color:var(--gold)}
.flag-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:220px;overflow-y:auto;background:var(--bg3);border-radius:0 0 var(--radius-sm) var(--radius-sm);padding:8px;border:1px solid var(--border2);border-top:none}
.flag-opt{display:flex;align-items:center;justify-content:center;padding:6px;border-radius:6px;cursor:pointer;transition:background 0.1s;font-size:22px;line-height:1}
.flag-opt:hover,.flag-opt.selected{background:var(--gold-dim);outline:1.5px solid var(--gold)}
.emoji-cat-tabs{display:flex;gap:4px;padding:6px 8px 0;background:var(--bg3);border:1px solid var(--border2);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0;overflow-x:auto;scrollbar-width:none}
.emoji-cat-tabs::-webkit-scrollbar{display:none}
.emoji-cat-tab{flex-shrink:0;font-size:18px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s;border:none;background:none}
.emoji-cat-tab:hover{background:var(--bg4)}
.emoji-cat-tab.active{background:var(--gold-dim);outline:1.5px solid var(--gold)}
.ttype-opt{border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 8px;cursor:pointer;text-align:center;transition:all 0.15s;background:var(--bg3);font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text2)}
.ttype-opt.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
</style>
</head>

// Returns a simple emoji span — pure text, works on all browsers/OS
function flagHTML(emoji, size=18){
  const em=(emoji&&emoji!=='__'&&emoji.length>0)?emoji:DEFAULT_AVATAR;
  return `<span style="font-size:${size}px;line-height:1;vertical-align:middle;display:inline-block">${em}</span>`;
}

// Legacy compat — now a no-op, values are stored as emoji directly
function toFlagCode(val){
  if(!val||val==='🏳️'||val==='__')return DEFAULT_AVATAR;
  // Convert old 2-letter ISO codes to flag emojis
  if(/^[a-z]{2}$/.test(val)){
    try{const c=val.toUpperCase();return String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65,0x1F1E6+c.charCodeAt(1)-65);}
    catch(e){return DEFAULT_AVATAR;}
  }
  return val;
}

let currentEmojiCat={reg:0,edit:0};

function buildEmojiPicker(catContainerId,gridId,prefix){
  const catEl=document.getElementById(catContainerId);
  const gridEl=document.getElementById(gridId);
  if(!catEl||!gridEl)return;
  const selVal=prefix==='reg'?regFlagSel:editFlagSel;
  catEl.className='emoji-cat-tabs';
  catEl.innerHTML=AVATAR_CATEGORIES.map((c,i)=>
    `<button class="emoji-cat-tab${i===currentEmojiCat[prefix]?' active':''}" onclick="switchEmojiCat('${prefix}',${i})" title="${c.name}">${c.label}</button>`
  ).join('');
  const cat=AVATAR_CATEGORIES[currentEmojiCat[prefix]||0];
  gridEl.innerHTML=cat.emojis.map(em=>
    `<div class="flag-opt${em===selVal?' selected':''}" onclick="pickEmoji('${prefix}','${em}')">${em}</div>`
  ).join('');
}

// Alias called at startup and from buildFlagPicker references
function buildFlagPicker(gridId,prefix){
  buildEmojiPicker(prefix+'-emoji-categories',gridId,prefix);
}

function switchEmojiCat(prefix,idx){
  currentEmojiCat[prefix]=idx;
  buildEmojiPicker(prefix+'-emoji-categories',prefix+'-flags',prefix);
}

function pickEmoji(prefix,emoji){
  if(prefix==='reg')setRegFlag(emoji);
  else setEditFlag(emoji);
}

function toggleFlagPicker(p){
  const el=document.getElementById(p+'-flag-picker');
  if(!el)return;
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  if(!isOpen)buildEmojiPicker(p+'-emoji-categories',p+'-flags',p);
}

function setRegFlag(emoji){
  regFlagSel=emoji||DEFAULT_AVATAR;
  const prev=document.getElementById('reg-flag-preview');
  if(prev)prev.textContent=regFlagSel;
  const hint=document.getElementById('reg-flag-hint');
  if(hint)hint.textContent='✓';
  const el=document.getElementById('reg-flag-picker');
  if(el)el.style.display='none';
}

function setEditFlag(emoji){
  editFlagSel=emoji||DEFAULT_AVATAR;
  const prev=document.getElementById('edit-flag-preview');
  if(prev)prev.textContent=editFlagSel;
  const hint=document.getElementById('edit-flag-hint');
  if(hint)hint.textContent='✓';
  const el=document.getElementById('edit-flag-picker');
  if(el)el.style.display='none';
}

function migrateFlags(){
  let users=DB.getUsers();let changed=false;
  users=users.map(u=>{const v=toFlagCode(u.flag||'');if(v!==u.flag){u.flag=v;changed=true;}return u;});
  if(changed)DB.setUsers(users);
  let regs=DB.getRegs();let rc=false;
  regs=regs.map(r=>{const v=toFlagCode(r.flag||'');if(v!==r.flag){r.flag=v;rc=true;}return r;});
  if(rc)DB.setRegs(regs);
}

// ═══════════════════════════════════════════════════════════════
//  SECURITY
// ═══════════════════════════════════════════════════════════════
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function authTab(tab){
  document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
  document.getElementById('auth-register').style.display=tab==='register'?'block':'none';
  document.getElementById('auth-tab-login').classList.toggle('active',tab==='login');
  document.getElementById('auth-tab-register').classList.toggle('active',tab==='register');
  document.getElementById('login-err').style.display='none';
  document.getElementById('reg-err').style.display='none';
}
async function doLogin(){
  const pseudo=document.getElementById('login-pseudo').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!pseudo||!pw){showAuthErr('login',t('err_fill'));return;}
  const h=await hashPw(pw);
  const u=DB.getUsers().find(x=>x.pseudo.toLowerCase()===pseudo.toLowerCase()&&x.pw===h);
  if(!u){showAuthErr('login',t('err_login'));return;}
  CU=u;initApp();
}
async function doRegister(){
  const pseudo=document.getElementById('reg-pseudo').value.trim();
  const power=parseFloat(document.getElementById('reg-power').value);
  const pw=document.getElementById('reg-pw').value;
  const pw2=document.getElementById('reg-pw2').value;
  if(!pseudo){showAuthErr('reg',t('err_pseudo'));return;}
  if(!power||power<=0){showAuthErr('reg',t('err_power'));return;}
  if(!regUnitSel){showAuthErr('reg',t('err_unit'));return;}
  if(!pw||pw.length<4){showAuthErr('reg',t('err_pw_short'));return;}
  if(pw!==pw2){showAuthErr('reg',t('err_pw_match'));return;}
  const users=DB.getUsers();
  if(users.find(x=>x.pseudo.toLowerCase()===pseudo.toLowerCase())){showAuthErr('reg',t('err_pseudo_taken'));return;}
  const h=await hashPw(pw);
  const isFirst=users.length===0;
  const u={id:'u_'+Date.now(),pseudo,power,flag:regFlagSel,unit:regUnitSel,pw:h,role:isFirst?'admin':'player',createdAt:new Date().toISOString()};
  users.push(u);DB.setUsers(users);CU=u;
  showToast(t('toast_welcome')+' '+pseudo,'success');
  initApp();
}
function showAuthErr(p,msg){const el=document.getElementById(p+'-err');if(el){el.textContent=msg;el.style.display='block';}}
function doLogout(){
  CU=null;selEventId=null;
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-auth').style.display='flex';
  document.getElementById('bottomnav').classList.add('hidden');
  authTab('login');
  applyLang();
}

function migrateFlags(){
  // Migrate any old emoji flags to ISO codes
  let users=DB.getUsers();
  let changed=false;
  users=users.map(u=>{
    const code=toFlagCode(u.flag||'__');
    if(code!==u.flag){u.flag=code;changed=true;}
    return u;
  });
  if(changed)DB.setUsers(users);
  let regs=DB.getRegs();
  let rChanged=false;
  regs=regs.map(r=>{
    const code=toFlagCode(r.flag||'__');
    if(code!==r.flag){r.flag=code;rChanged=true;}
    return r;
  });
  if(rChanged)DB.setRegs(regs);
}

function initApp(){
  document.getElementById('screen-auth').style.display='none';
  const app=document.getElementById('screen-app');
  app.style.display='flex';app.style.flexDirection='column';app.style.height='100vh';
  document.getElementById('bottomnav').classList.remove('hidden');
  document.getElementById('bn-admin').style.display=(CU.role==='admin'||CU.role==='manager')?'flex':'none';
  migrateFlags();
  if(CU)CU=DB.getUsers().find(x=>x.id===CU.id)||CU; // refresh after migration
  buildFlagPicker('reg-flags','reg');
  buildFlagPicker('edit-flags','edit');
  const evs=DB.getEvents();
  listEventId=evs[0]?.id||null;
  admEvent=evs[0]?.id||null;
  // Reset emoji picker display
  const rd=document.getElementById('reg-flag-preview');
  if(rd)rd.textContent=DEFAULT_AVATAR;
  const rh=document.getElementById('reg-flag-hint');
  if(rh)rh.textContent='';
  regFlagSel=DEFAULT_AVATAR;
  applyLang();
  navTo('home');
}

function counterGrid(list,ev){
  const total=list.length,sel=list.filter(r=>r.status==='selected').length,res=list.filter(r=>r.status==='reserve').length,pend=list.filter(r=>r.status==='pending').length;
  const bg=ev.colorDark,border=ev.colorBorder;
  const cell=(n,lbl,col)=>`<div style="background:${bg};border:1px solid ${border};border-radius:6px;padding:7px 3px;text-align:center"><div style="font-family:var(--font-head);font-size:18px;font-weight:700;color:${col}">${n}</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;margin-top:1px">${lbl}</div></div>`;
  return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${cell(total,t('total'),'#e8eaf0')}${cell(sel,t('sel'),'var(--green)')}${cell(res,t('repl'),'var(--gold)')}${cell(pend,t('waiting'),'var(--text3)')}</div>`;
}

function renderEventsPage(){
  if(!CU)return;refreshUser();
  const evs=DB.getEvents();
  const grid=document.getElementById('ev-event-grid');
  grid.innerHTML=evs.map(ev=>`<div class="event-card" id="ec-${ev.id}" onclick="selectEvent('${ev.id}')" style="${evCardStyle(ev,selEventId===ev.id)}">
    <div class="ev-icon">${ev.emoji}</div>
    <h3 style="color:${ev.colorText}">${evName(ev)}</h3>
    <p>${ev.type==='single'?teamTimeLabel(ev,''):t('times_by_team')}</p>
  </div>`).join('');
  const myRegs=DB.getRegs().filter(r=>r.userId===CU.id);
  const sm={pending:t('st_pending'),selected:t('st_selected'),reserve:t('st_reserve'),miss:t('st_miss'),absent:t('st_absent')};
  const bm={pending:'badge-gray',selected:'badge-green',reserve:'badge-orange',miss:'badge-gray',absent:'badge-red'};
  const elMyRegs=document.getElementById('ev-my-regs');
  if(myRegs.length>0){
    elMyRegs.innerHTML='<div class="card"><div class="card-title">'+t('my_regs')+'</div>'+
      myRegs.map(r=>{
        const ev=getEvent(r.event);
        const label=ev?ev.emoji+' '+evName(ev):'?';
        const teamLabel=ev&&ev.type==='multi'?` · Team ${r.team}`:'';
        return `<div class="reg-row"><div class="reg-info">
          <div class="reg-name">${label}${teamLabel}</div>
          <div class="reg-time">${t('registered_on')} ${fmtDate(r.registeredAt)}</div></div>
          <span class="badge ${bm[r.status]||'badge-gray'}">${sm[r.status]||r.status}</span>
          <button onclick="cancelReg('${r.id}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px">✕</button>
        </div>`;
      }).join('')+'</div>';
  }else elMyRegs.innerHTML='';
  // History warnings — show only when the player's current reg for that event/team is still pending
  const warns=[];
  const myRegsIds=new Set(myRegs.map(r=>r.event+'_'+(r.team||'')));
  DB.getHistory().filter(h=>h.userId===CU.id).forEach(h=>{
    if(!['absent','miss'].includes(h.status))return;
    const ev=getEvent(h.event);const evN=ev?evName(ev):h.event;
    // Find if player has a current pending reg for this event+team
    const currentReg=myRegs.find(r=>r.event===h.event&&(
      ev?.type==='single'||r.team===h.team||r.team==='AB'||h.team===''
    ));
    // Show warning if no current reg yet, or current reg is still pending
    if(!currentReg||currentReg.status==='pending'){
      if(h.status==='absent')warns.push(`🔴 ${t('absent_prev')} — ${evN}${h.team?' Team '+h.team:''}`);
      else if(h.status==='miss')warns.push(`⚠️ ${t('miss_prev')} — ${evN}${h.team?' Team '+h.team:''}`);
    }
  });
  const notice=document.getElementById('ev-notice');
  if(warns.length){notice.innerHTML='<div class="notice">'+warns.join('<br>')+'</div>';notice.style.display='block';}
  else notice.style.display='none';
  document.getElementById('ev-team-section').style.display='none';
  document.getElementById('ev-single-team-row').style.display='none';
  document.getElementById('ev-multi-team-row').style.display='none';
}

function selectEvent(id){
  selEventId=id;selSingleTeam=null;desertTeams={A:false,B:false};
  const evs=DB.getEvents();
  evs.forEach(ev=>{
    const el=document.getElementById('ec-'+ev.id);
    if(el)el.setAttribute('style',evCardStyle(ev,ev.id===id));
  });
  const ev=getEvent(id);if(!ev)return;
  const ts=document.getElementById('ev-team-section');
  const sr=document.getElementById('ev-single-team-row');
  const mr=document.getElementById('ev-multi-team-row');
  if(ev.type==='single'){
    ts.style.display='none';
  }else if(ev.type==='multi'){
    ts.style.display='block';sr.style.display='none';mr.style.display='block';
    document.getElementById('dt-a-time').textContent=teamTimeLabel(ev,'A');
    document.getElementById('dt-b-time').textContent=teamTimeLabel(ev,'B');
    document.getElementById('dt-a').className='desert-team-opt';
    document.getElementById('dt-b').className='desert-team-opt';
    document.getElementById('dt-both').className='desert-team-opt';
  }
}
function selectSingleTeam(team){
  selSingleTeam=team;
  document.getElementById('ev-st-a').style.borderColor=team==='A'?'var(--blue)':'var(--border2)';
  document.getElementById('ev-st-b').style.borderColor=team==='B'?'var(--red)':'var(--border2)';
}
function toggleDesertTeam(team){desertTeams[team]=!desertTeams[team];updateDesertUI();}
function selectDesertBoth(){desertTeams={A:true,B:true};updateDesertUI();}
function updateDesertUI(){
  const both=desertTeams.A&&desertTeams.B;
  document.getElementById('dt-a').className='desert-team-opt'+(desertTeams.A&&!both?' active-a':'')+(both?' active-both':'');
  document.getElementById('dt-b').className='desert-team-opt'+(desertTeams.B&&!both?' active-b':'')+(both?' active-both':'');
  document.getElementById('dt-both').className='desert-team-opt'+(both?' active-both':'');
}
function doRegisterEvent(){
  if(!selEventId){showToast(t('no_event'),'error');return;}
  const ev=getEvent(selEventId);if(!ev)return;
  const regs=DB.getRegs();const now=new Date().toISOString();
  if(ev.type==='single'){
    if(regs.find(r=>r.userId===CU.id&&r.event===ev.id)){showToast(t('already_reg'),'error');return;}
    regs.push({id:'r_'+Date.now(),userId:CU.id,pseudo:CU.pseudo,flag:CU.flag,power:CU.power,unit:CU.unit,event:ev.id,team:'',status:'pending',registeredAt:now});
    showToast(t('toast_registered')+' — '+ev.name,'success');
  }else{
    if(!desertTeams.A&&!desertTeams.B){showToast(t('no_team'),'error');return;}
    const teamsToReg=[];
    if(desertTeams.A&&desertTeams.B){
      if(regs.find(r=>r.userId===CU.id&&r.event===ev.id)){showToast(t('already_reg'),'error');return;}
      teamsToReg.push('AB');
    }else{
      if(desertTeams.A){if(regs.find(r=>r.userId===CU.id&&r.event===ev.id&&(r.team==='A'||r.team==='AB'))){showToast(t('already_reg_a'),'error');return;}teamsToReg.push('A');}
      if(desertTeams.B){if(regs.find(r=>r.userId===CU.id&&r.event===ev.id&&(r.team==='B'||r.team==='AB'))){showToast(t('already_reg_b'),'error');return;}teamsToReg.push('B');}
    }
    teamsToReg.forEach((team,i)=>regs.push({id:'r_'+Date.now()+'_'+i,userId:CU.id,pseudo:CU.pseudo,flag:CU.flag,power:CU.power,unit:CU.unit,event:ev.id,team,status:'pending',registeredAt:now}));
    showToast(t('toast_registered')+' — '+ev.name+' '+t('toast_team')+' '+teamsToReg.join('+'),'success');
  }
  DB.setRegs(regs);selEventId=null;desertTeams={A:false,B:false};
  document.getElementById('ev-team-section').style.display='none';
  renderEventsPage();renderHome();
}
function cancelReg(rid){
  DB.setRegs(DB.getRegs().filter(r=>r.id!==rid));
  showToast(t('toast_cancelled'),'info');
  renderEventsPage();renderHome();
}

function renderListTeamTabs(){

function renderList(){
  const ev=getEvent(listEventId);
  if(!ev){document.getElementById('list-content').innerHTML='';return;}
  let regs=ev.type==='single'
    ?DB.getRegs().filter(r=>r.event===listEventId)
    :DB.getRegs().filter(r=>r.event===listEventId&&(r.team===listTeam||r.team==='AB'));
  const sorted=[...regs].sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  const total=sorted.length,sel=sorted.filter(r=>r.status==='selected').length,res=sorted.filter(r=>r.status==='reserve').length,pend=sorted.filter(r=>r.status==='pending').length;
  document.getElementById('list-stats').innerHTML=`
    <div class="stat-box"><div class="num">${total}</div><div class="lbl">${t('total')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--green)">${sel}</div><div class="lbl">${t('sel')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--gold)">${res}</div><div class="lbl">${t('repl')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--text3)">${pend}</div><div class="lbl">${t('waiting')}</div></div>`;
  if(!sorted.length){
    document.getElementById('list-content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>${t('no_regs')}</p></div>`;
    return;
  }
  const hist=DB.getHistory();
  const sl={pending:t('st_pending'),selected:t('st_selected'),reserve:t('st_reserve'),miss:t('st_miss'),absent:t('st_absent')};
  const bg={pending:'badge-gray',selected:'badge-green',reserve:'badge-orange',miss:'badge-gray',absent:'badge-red'};
  document.getElementById('list-content').innerHTML=sorted.map((r,i)=>{
    const lookupTeams=r.team==='AB'?[listTeam]:r.team?[r.team]:[''];
    const h=ev.type==='multi'
      ?hist.find(x=>x.userId===r.userId&&x.event===listEventId&&lookupTeams.includes(x.team))
      :hist.find(x=>x.userId===r.userId&&x.event===listEventId);
    let hb='';
    if(h&&r.status==='pending'){
      if(h.status==='absent')hb=`<span title="${t('absent_prev')}">🔴</span>`;
      else if(h.status==='miss')hb=`<span title="${t('miss_prev')}">⚠️</span>`;
    }
    const abTag=ev.type==='multi'&&r.team==='AB'?'<span class="ab-badge">A+B</span>':'';
    return `<div class="reg-row">
      <div class="reg-info">
        <div class="reg-name">#${i+1} ${flagHTML(r.flag,14)} ${escHtml(r.pseudo)} ${unitIconHTML(r.unit,14)} ${abTag} ${hb}</div>
        <div class="reg-time">⚡${r.power}M • ${fmtDate(r.registeredAt)}</div>
      </div>
      <span class="badge ${bg[r.status]||'badge-gray'}">${sl[r.status]||r.status}</span>
    </div>`;
  }).join('');
}

function renderProfile(){

function renderProfileHistory(){
  const hist=DB.getHistory().filter(h=>h.userId===CU.id);
  const regs=DB.getRegs().filter(r=>r.userId===CU.id);
  const el=document.getElementById('prof-history');
  if(!hist.length&&!regs.length){el.innerHTML=`<div style="color:var(--text3);font-size:14px">${t('no_history')}</div>`;return;}
  const all=[...hist.map(h=>({...h,cur:false})),...regs.map(r=>({userId:r.userId,event:r.event,team:r.team,status:r.status,date:r.registeredAt,cur:true}))];
  const sl={pending:t('st_pending'),selected:t('st_selected'),reserve:t('st_reserve'),miss:t('st_miss'),absent:t('st_absent')};
  const bg={pending:'badge-gray',selected:'badge-green',reserve:'badge-orange',miss:'badge-gray',absent:'badge-red'};
  el.innerHTML=all.map(h=>{
    const ev=getEvent(h.event);
    const evN=ev?ev.emoji+' '+evName(ev):h.event;
    const teamLabel=ev&&ev.type==='multi'&&h.team?` · Team ${h.team}`:'';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid var(--border)">
      <div style="flex:1"><div style="font-family:var(--font-head);font-size:14px;font-weight:600">${evN}${teamLabel}</div>
      <div style="font-size:11px;color:var(--text3)">${h.cur?t('current_week'):t('prev_week')}</div></div>
      <span class="badge ${bg[h.status]||'badge-gray'}">${sl[h.status]||h.status}</span>
    </div>`;
  }).join('');
}
async function saveProfile(){
  const pseudo=document.getElementById('edit-pseudo').value.trim();
  const power=parseFloat(document.getElementById('edit-power').value);
  const pw=document.getElementById('edit-pw').value;
  if(!pseudo){showToast(t('err_pseudo_empty'),'error');return;}
  if(!power||power<=0){showToast(t('err_power_invalid'),'error');return;}
  if(!editUnitSel){showToast(t('err_unit'),'error');return;}
  const users=DB.getUsers();
  if(users.find(x=>x.pseudo.toLowerCase()===pseudo.toLowerCase()&&x.id!==CU.id)){showToast(t('err_pseudo_taken'),'error');return;}
  const idx=users.findIndex(x=>x.id===CU.id);if(idx===-1)return;
  users[idx].pseudo=pseudo;users[idx].power=power;users[idx].flag=editFlagSel;users[idx].unit=editUnitSel;
  if(pw&&pw.length>=4)users[idx].pw=await hashPw(pw);
  DB.setRegs(DB.getRegs().map(r=>{if(r.userId===CU.id){r.pseudo=pseudo;r.flag=editFlagSel;r.power=power;r.unit=editUnitSel;}return r;}));
  DB.setUsers(users);CU=users[idx];
  showToast(t('toast_profile'),'success');renderProfile();renderHome();
}

function renderAdmList(){
  const ev=getEvent(admEvent);
  if(!ev){document.getElementById('adm-list').innerHTML='';return;}
  let regs=ev.type==='single'
    ?DB.getRegs().filter(r=>r.event===admEvent)
    :DB.getRegs().filter(r=>r.event===admEvent&&(r.team===admTeam||r.team==='AB'));
  const sorted=[...regs].sort((a,b)=>new Date(a.registeredAt)-new Date(b.registeredAt));
  const hist=DB.getHistory();
  const total=sorted.length,sel=sorted.filter(r=>r.status==='selected').length,res=sorted.filter(r=>r.status==='reserve').length,abs=sorted.filter(r=>r.status==='absent').length;
  document.getElementById('adm-stats').innerHTML=`
    <div class="stat-box"><div class="num">${total}</div><div class="lbl">${t('total')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--green)">${sel}</div><div class="lbl">${t('sel')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--gold)">${res}</div><div class="lbl">${t('repl')}</div></div>
    <div class="stat-box"><div class="num" style="color:var(--red)">${abs}</div><div class="lbl">${t('absents')}</div></div>`;
  if(!sorted.length){
    document.getElementById('adm-list').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>${t('no_regs')}</p></div>`;
    return;
  }
  document.getElementById('adm-list').innerHTML=sorted.map((r,i)=>{
    // Find history entry for this player on this event/team.
    // A player registered AB has entries saved as 'A' and 'B' individually.
    // We look for the relevant team entry.
    const lookupTeams=r.team==='AB'?[admTeam]:r.team?[r.team]:[''];
    const h=hist.find(x=>
      x.userId===r.userId &&
      x.event===r.event &&
      (ev.type==='single' || lookupTeams.includes(x.team))
    );
    // Only show badge if history status differs from current status
    // (i.e. it reflects last week, not this week's current status)
    const isCurrentWeekEntry = r.status!=='pending' && h && h.status===r.status;
    let hb='';
    if(h && !isCurrentWeekEntry){
      if(h.status==='absent')hb=`<span title="${t('absent_prev')}" style="font-size:14px">🔴</span>`;
      else if(h.status==='miss')hb=`<span title="${t('miss_prev')}" style="font-size:14px">⚠️</span>`;
    } else if(h && r.status==='pending'){
      // Player has a history but hasn't been processed yet this week — show it
      if(h.status==='absent')hb=`<span title="${t('absent_prev')}" style="font-size:14px">🔴</span>`;
      else if(h.status==='miss')hb=`<span title="${t('miss_prev')}" style="font-size:14px">⚠️</span>`;
    }
    const abTag=ev.type==='multi'&&r.team==='AB'?'<span class="ab-badge">A+B</span>':'';
    const rowClass={pending:'',selected:' status-selected',reserve:' status-reserve',absent:' status-absent',miss:' status-miss'}[r.status]||'';
    return `<div class="player-row${rowClass}">
      <div class="player-avatar">${flagHTML(r.flag,18)}</div>
      <div class="player-info">
        <div class="player-name">#${i+1} ${escHtml(r.pseudo)} ${unitIconHTML(r.unit,14)} ${abTag} ${hb}</div>
        <div class="player-meta">⚡${r.power}M • ${fmtDate(r.registeredAt)}</div>
      </div>
      <div class="player-actions">
        <div class="icon-btn ${r.status==='selected'?'active-green':''}" title="${t('tt_select')}" onclick="setRegStatus('${r.id}','selected')">
          <svg><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="icon-btn ${r.status==='reserve'?'active-gold':''}" title="${t('tt_reserve')}" onclick="setRegStatus('${r.id}','reserve')">
          <svg><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="icon-btn ${r.status==='miss'?'active-white':''}" title="${t('tt_miss')}" onclick="setRegStatus('${r.id}','miss')">
          <svg><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </div>
        <div class="icon-btn ${r.status==='absent'?'active-red':''}" title="${t('tt_absent')}" onclick="setRegStatus('${r.id}','absent')">
          <svg><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="14" y2="18"/><line x1="14" y1="14" x2="10" y2="18"/></svg>
        </div>
      </div>
    </div>`;
  }).join('');
}
function setRegStatus(rid,status){
  const regs=DB.getRegs(),r=regs.find(x=>x.id===rid);if(!r)return;
  if(r.status===status){
    r.status='pending';
  }else{
    r.status=status;
    const ev=getEvent(r.event);
    // Determine which teams this registration covers
    const teams=r.team==='AB'?['A','B']:(r.team?[r.team]:['']);
    // Remove existing history entries for this user/event/teams combo (current week only)
    let hist=DB.getHistory().filter(h=>{
      if(h.userId!==r.userId||h.event!==r.event)return true;
      if(ev?.type==='single')return false; // remove single-team entry
      return !teams.includes(h.team); // remove only matching teams
    });
    // Save one history entry per team
    if(['absent','miss','selected','reserve'].includes(status)){
      teams.forEach(team=>{
        hist.push({userId:r.userId,event:r.event,team:team||'',status,date:new Date().toISOString()});
      });
    }
    DB.setHistory(hist);
  }
  DB.setRegs(regs);renderAdmList();
}

function renderAdmMembers(){

  if(!users.length){el.innerHTML=`<div class="empty"><p>${t('no_members')}</p></div>`;return;}
  el.innerHTML=users.map(u=>`<div class="member-row">
    <div class="member-top">
      <div class="player-avatar">${flagHTML(u.flag,18)}</div>
      <div class="player-info">
        <div class="player-name">${escHtml(u.pseudo)} ${unitIconHTML(u.unit,14)}</div>
        <div class="player-meta">⚡${u.power}M • ${t('joined')} ${fmtDate(u.createdAt)}</div>
      </div>
      <span class="badge badge-${rcM[u.role]||'gray'}">${rlM[u.role]||u.role}</span>
    </div>
    ${CU.role==='admin'&&u.id!==CU.id?`<div class="member-actions">
      <button class="btn btn-ghost btn-sm" onclick="setRole('${u.id}','player')">${t('give_player')}</button>
      <button class="btn btn-ghost btn-sm" onclick="setRole('${u.id}','manager')">${t('give_manager')}</button>
      <button class="btn btn-ghost btn-sm" style="border-color:var(--gold);color:var(--gold)" onclick="setRole('${u.id}','admin')">${t('give_admin')}</button>
      <button class="btn btn-danger btn-sm" onclick="askDeleteMember('${u.id}')">${t('delete_player')}</button>

  </div>`).join('');
}
function setRole(uid,role){
  const users=DB.getUsers(),u=users.find(x=>x.id===uid);if(!u)return;
  u.role=role;DB.setUsers(users);showToast(u.pseudo+' → '+role,'success');renderAdmMembers();renderHome();
}
function askDeleteMember(uid){
  pendingDeleteId=uid;
  const u=DB.getUsers().find(x=>x.id===uid);if(!u)return;
  document.getElementById('modal-delete-body').textContent=t('del_member_pre')+' "'+u.pseudo+'" '+t('del_member_post');
  document.getElementById('modal-delete-member').classList.add('active');
}
function confirmDeleteMember(){
  if(!pendingDeleteId)return;
  const uid=pendingDeleteId;
  DB.setUsers(DB.getUsers().filter(x=>x.id!==uid));
  DB.setRegs(DB.getRegs().filter(r=>r.userId!==uid));
  DB.setHistory(DB.getHistory().filter(h=>h.userId!==uid));
  closeModal('delete-member');pendingDeleteId=null;
  showToast(t('toast_deleted'),'info');renderAdmMembers();
}

function renderAdmManage(){

      ?(ev.timeFR+' · '+ev.timeSRV)

      <div class="managed-ev-dot" style="background:${ev.color}"></div>

function askDeleteEvent(id){

  const ev=getEvent(id);if(!ev)return;

  document.getElementById('modal-delete-event').classList.add('active');
}
function confirmDeleteEvent(){
  if(!pendingDeleteEventId)return;
  const id=pendingDeleteEventId;
  const evs=DB.getEvents().filter(e=>e.id!==id);
  DB.setEvents(evs);
  DB.setRegs(DB.getRegs().filter(r=>r.event!==id));

function openCreateEventModal(){
  nevColorSel=null;nevEmojiSel=null;nevTypeSel='single';
  const cp=document.getElementById('nev-color-picker');
  cp.innerHTML=COLOR_PALETTE.map(c=>`<div class="color-swatch" style="background:${c.hex}" onclick="selectNevColor('${c.hex}')"></div>`).join('');
  const ep=document.getElementById('nev-emoji-picker');
  ep.innerHTML=EMOJI_PALETTE.map(em=>`<div class="emoji-opt" onclick="selectNevEmoji('${em}')">${em}</div>`).join('');

  document.getElementById('nev-name').value='';

}
function selectNevColor(hex){
  nevColorSel=hex;

function selectNevEmoji(em){

  document.getElementById('nev-emoji-display').textContent=em;
  document.querySelectorAll('#nev-emoji-picker .emoji-opt').forEach(s=>s.classList.toggle('selected',s.textContent===em));
}
function selectEventType(type){
  nevTypeSel=type;
  document.getElementById('nev-type-single').classList.toggle('active',type==='single');
  document.getElementById('nev-type-multi').classList.toggle('active',type==='multi');
  document.getElementById('nev-single-times').style.display=type==='single'?'block':'none';
  document.getElementById('nev-multi-times').style.display=type==='multi'?'block':'none';
}
function confirmCreateEvent(){
  const name=document.getElementById('nev-name').value.trim();
  const errEl=document.getElementById('nev-err');
  if(!name){errEl.textContent=t('err_ev_name');errEl.style.display='block';return;}
  if(!nevColorSel){errEl.textContent=t('err_ev_color');errEl.style.display='block';return;}
  if(!nevEmojiSel){errEl.textContent=t('err_ev_emoji');errEl.style.display='block';return;}
  const col=COLOR_PALETTE.find(c=>c.hex===nevColorSel)||COLOR_PALETTE[0];

    id:'ev_'+Date.now(),name,emoji:nevEmojiSel,
    color:col.hex,colorDark:col.dark,colorBorder:col.border,colorText:col.text,

  };

    newEv.timeSRV=document.getElementById('nev-s-srv').value||'—';
  }else{

    newEv.timeASRV=document.getElementById('nev-a-srv').value||'—';

}

// ═══════════════════════════════════════════════════════════════
//  EDIT EVENT MODAL
// ═══════════════════════════════════════════════════════════════
let editingEventId=null,eedTypeSel='single';

function selectEditType(type){
  eedTypeSel=type;
  document.getElementById('eed-type-single').classList.toggle('active',type==='single');
  document.getElementById('eed-type-multi').classList.toggle('active',type==='multi');
  document.getElementById('eed-single-times').style.display=type==='single'?'block':'none';
  document.getElementById('eed-multi-times').style.display=type==='multi'?'block':'none';
}

function openEditEventModal(id){
  const ev=getEvent(id);if(!ev)return;
  editingEventId=id;
  // Pre-fill fields
  document.getElementById('eed-name-fr').value=ev.name||'';
  document.getElementById('eed-name-en').value=ev.nameEN||'';
  eedTypeSel=ev.type||'single';
  if(ev.type==='single'){
    document.getElementById('eed-s-fr').value=ev.timeFR||'';
    document.getElementById('eed-s-srv').value=ev.timeSRV||'';
  }else{
    document.getElementById('eed-a-fr').value=ev.timeAFR||'';
    document.getElementById('eed-a-srv').value=ev.timeASRV||'';
    document.getElementById('eed-b-fr').value=ev.timeBFR||'';
    document.getElementById('eed-b-srv').value=ev.timeBSRV||'';
  }
  document.getElementById('eed-warn').style.display='none';
  selectEditType(eedTypeSel);
  document.getElementById('modal-edit-event').classList.add('active');
}

function confirmEditEvent(){
  const ev=getEvent(editingEventId);if(!ev)return;
  const nameFR=document.getElementById('eed-name-fr').value.trim();
  const nameEN=document.getElementById('eed-name-en').value.trim();
  const warnEl=document.getElementById('eed-warn');
  if(!nameFR){warnEl.textContent=t('err_ev_name');warnEl.style.display='block';return;}

  // Check if type changed — warn about clearing registrations if needed
  const typeChanged=eedTypeSel!==ev.type;

  // Save to DB
  const evs=DB.getEvents();
  const idx=evs.findIndex(e=>e.id===editingEventId);
  if(idx===-1)return;
  evs[idx].name=nameFR;
  evs[idx].nameEN=nameEN||undefined;
  evs[idx].type=eedTypeSel;

  if(eedTypeSel==='single'){
    evs[idx].timeFR=document.getElementById('eed-s-fr').value||'—';
    evs[idx].timeSRV=document.getElementById('eed-s-srv').value||'—';
    // Clear multi-team fields if switching
    delete evs[idx].timeAFR;delete evs[idx].timeASRV;
    delete evs[idx].timeBFR;delete evs[idx].timeBSRV;
  }else{
    evs[idx].timeAFR=document.getElementById('eed-a-fr').value||'—';
    evs[idx].timeASRV=document.getElementById('eed-a-srv').value||'—';
    evs[idx].timeBFR=document.getElementById('eed-b-fr').value||'—';
    evs[idx].timeBSRV=document.getElementById('eed-b-srv').value||'—';
    // Clear single-team fields if switching
    delete evs[idx].timeFR;delete evs[idx].timeSRV;
  }

  // If type changed, clear registrations for this event (structure incompatible)
  if(typeChanged){
    DB.setRegs(DB.getRegs().filter(r=>r.event!==editingEventId));
    DB.setHistory(DB.getHistory().filter(h=>h.event!==editingEventId));
  }

  DB.setEvents(evs);
  closeModal('edit-event');editingEventId=null;
  showToast(t('toast_ev_saved'),'success');
  renderAdmManage();renderAdmEventTabs();renderHome();renderEventsPage();
  if(document.getElementById('page-list').classList.contains('active'))renderListTabs();
}

// ═══════════════════════════════════════════════════════════════
//  SPLIT MODAL
// ═══════════════════════════════════════════════════════════════
function openSplitModal(){
  const ev=getEvent(admEvent);
  const allRegs=DB.getRegs().filter(r=>r.event===admEvent);
  const selected=allRegs.filter(r=>r.status==='selected');
  const reserves=allRegs.filter(r=>r.status==='reserve');
  const el=document.getElementById('modal-split-content');
  if(!selected.length&&!reserves.length){
    el.innerHTML=`<p style="color:var(--text3);font-size:14px;margin-bottom:12px">${t('split_none')}</p>`;
    document.getElementById('modal-split').classList.add('active');return;
  }
  function snakeDraft(list){
    const A=[],B=[];
    list.forEach((p,i)=>{const round=Math.floor(i/2),pos=i%2;if(round%2===0){pos===0?A.push(p):B.push(p);}else{pos===0?B.push(p):A.push(p);}});
    return{A,B};
  }
  const sortedSel=[...selected].sort((a,b)=>b.power-a.power);
  const sortedRes=[...reserves].sort((a,b)=>b.power-a.power);
  const{A:selA,B:selB}=snakeDraft(sortedSel);
  const{A:resA,B:resB}=snakeDraft(sortedRes);
  const renderTeam=(selList,resList,label,color)=>{
    const all=[...selList.map(p=>({...p,isRes:false})),...resList.map(p=>({...p,isRes:true}))];
    const totPow=all.reduce((s,p)=>s+p.power,0);
    return `<div class="split-team">
      <div class="split-team-title" style="color:${color}">${label} <span style="font-size:12px;color:var(--text3);font-weight:400">${all.length} ${t('split_players')} · ⚡${totPow.toFixed(1)}M</span></div>
      ${all.map((p,i)=>`<div class="split-row${p.isRes?' split-row-reserve':''}">
        <span class="split-rank">${p.isRes?'R'+(resList.indexOf(p)+1):'#'+(i+1)}</span>
        <span style="font-size:16px">${flagHTML(p.flag,18)}</span>
        <span class="split-name">${escHtml(p.pseudo)} ${unitIconHTML(p.unit,13)}</span>
        <span class="split-power">⚡${p.power}M</span>
        ${p.isRes?`<span style="font-size:10px;color:var(--orange);font-family:var(--font-head);font-weight:700">${t('split_reserve_lbl')}</span>`:''}
      </div>`).join('')}
    </div>`;
  };
  el.innerHTML=`<p style="color:var(--text3);font-size:12px;margin-bottom:12px">${t('split_sub')}</p>`
    +renderTeam(selA,resA,'⚔️ TEAM A','var(--blue)')
    +renderTeam(selB,resB,'⚔️ TEAM B','var(--red)');
  document.getElementById('modal-split').classList.add('active');
}

function openResetModal(){document.getElementById('modal-reset').classList.add('active');}
function closeModal(id){document.getElementById('modal-'+id).classList.remove('active');}
function doReset(){
  const ev=getEvent(admEvent);if(!ev)return;
  if(ev.type==='single'){DB.setRegs(DB.getRegs().filter(r=>r.event!==admEvent));}
  else{DB.setRegs(DB.getRegs().filter(r=>!(r.event===admEvent&&(r.team===admTeam||r.team==='AB'))));}
  closeModal('reset');showToast(t('toast_reset'),'info');renderAdmList();renderHome();
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){
  const d=new Date(iso),now=new Date(),diff=(now-d)/1000;
  if(diff<60)return lang==='fr'?"À l'instant":'Just now';
  if(diff<3600)return Math.floor(diff/60)+(lang==='fr'?'min':'min');
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return d.toLocaleDateString(lang==='fr'?'fr-FR':'en-GB',{day:'2-digit',month:'2-digit'});
}
let toastTimeout;
function showToast(msg,type='info'){
  const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(type||'');
  clearTimeout(toastTimeout);toastTimeout=setTimeout(()=>el.classList.remove('show'),3200);
}
